# Social Screen — Nginx site config
# Copy to: /etc/nginx/sites-available/socialscreen
# Enable:  sudo ln -sf /etc/nginx/sites-available/socialscreen /etc/nginx/sites-enabled/socialscreen
# Test:    sudo nginx -t && sudo systemctl reload nginx
#
# Obtain SSL first (HTTP only): certbot certonly --webroot -w /var/www/socialscreen -d socialscreen.in -d www.socialscreen.in
# Or use: certbot --nginx -d socialscreen.in -d www.socialscreen.in

# HTTPS
server {
    listen 443 ssl;
    server_name socialscreen.in www.socialscreen.in;
    ssl_certificate /etc/letsencrypt/live/socialscreen.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/socialscreen.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/socialscreen;
    index index.html;
    client_max_body_size 100M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    location /api {
        proxy_pass http://localhost:3000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://localhost:3000;
    }

    location /uploads {
        proxy_pass http://localhost:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* ^/(polyfills|main|styles|runtime|vendor|common|favicon|assets|push-sw).*\.(js|css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        root /var/www/socialscreen;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /index.html {
        root /var/www/socialscreen;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Social crawlers: OG meta from backend (same as NewsAdda)
    location ~ ^/news/(.+)$ {
        set $news_slug $1;
        if ($http_user_agent ~* "(facebookexternalhit|Facebot|Twitterbot|WhatsApp|LinkedInBot|SkypeUriPreview|Slackbot|Discordbot|Applebot|Googlebot|bingbot|YandexBot|Baiduspider)") {
            proxy_pass http://localhost:3000/news/$news_slug;
        }
        root /var/www/socialscreen;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        root /var/www/socialscreen;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}

# HTTP — redirect to HTTPS; ACME challenge for Certbot
server {
    listen 80;
    server_name socialscreen.in www.socialscreen.in;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/socialscreen;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
