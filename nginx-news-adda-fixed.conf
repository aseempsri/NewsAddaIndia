# HTTPS – full site for domain (must serve content, not redirect)
server {
    listen 443 ssl;
    server_name newsaddaindia.com www.newsaddaindia.com;
    ssl_certificate /etc/letsencrypt/live/newsaddaindia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newsaddaindia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html;
    index index.html;
    client_max_body_size 100M;

    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* ^/(polyfills|main|styles|runtime|vendor|common|favicon|assets).*\.(js|css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        root /var/www/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /index.html {
        root /var/www/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Route social media crawlers to backend for meta tags
    # This location block handles /news/* paths
    location ~ ^/news/(.+)$ {
        # Check user-agent with single regex pattern and proxy crawlers to backend
        if ($http_user_agent ~* "(facebookexternalhit|Facebot|Twitterbot|WhatsApp|LinkedInBot|SkypeUriPreview|Slackbot|Discordbot|Applebot|Googlebot|bingbot|YandexBot|Baiduspider)") {
            proxy_pass http://localhost:3000/news/$1;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            break;
        }
        
        # For regular users, serve Angular app
        root /var/www/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}

# HTTP – redirect domain to HTTPS, serve by IP, ACME for Certbot
server {
    listen 80 default_server;
    server_name newsaddaindia.com www.newsaddaindia.com 72.60.235.158;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    if ($host = newsaddaindia.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = www.newsaddaindia.com) {
        return 301 https://$host$request_uri;
    }

