# Social Screen — HTTP only (use BEFORE Certbot creates SSL certs)
# Copy to: /etc/nginx/sites-available/socialscreen
# After certbot: replace with nginx-socialscreen.conf

server {
    listen 80;
    server_name socialscreen.in www.socialscreen.in;

    root /var/www/socialscreen;
    index index.html;
    client_max_body_size 100M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/socialscreen;
        default_type "text/plain";
        try_files $uri =404;
    }

    location /api {
        proxy_pass http://localhost:3000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    location /health {
        proxy_pass http://localhost:3000;
    }

    location /uploads {
        proxy_pass http://localhost:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
